name: build

on:
  push:
    tags:
      - 'v*'
      - main
    branches:
      - main
  workflow_dispatch:
env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        if: ${{ !(startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')) }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart android ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          path: ./dist/*android-arm64-v8a.apk
          archive: false
          if-no-files-found: error
          overwrite: true

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          path: ./dist/*android-armeabi-v7a.apk
          archive: false
          if-no-files-found: error
          overwrite: true

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          path: ./dist/*android-x86_64.apk
          archive: false
          if-no-files-found: error
          overwrite: true
